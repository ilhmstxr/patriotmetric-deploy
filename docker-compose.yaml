services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # --- ZERO-GAP FIX: BYPASS BUILD NETWORK ISOLATION ---
      network: host
      # ----------------------------------------------------
    container_name: patriotmetric_app_deploy
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8002:8000"
    volumes:
      - app_storage:/opt/patriotmetric/storage/app/public
      - ./.env:/opt/patriotmetric/.env
      - ./public/assets:/opt/patriotmetric/public/assets
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/up || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - avablox-net

volumes:
  app_storage:

networks:
  avablox-net:
    driver: bridge
