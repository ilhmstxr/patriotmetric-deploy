services:
  app:
    build:
      context: .           # Mengarahkan Docker untuk membaca Dockerfile di atas
    container_name: laravel_app
    restart: always
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - /var/www/node_modules
      - /var/www/vendor
    ports:
      - "8000:8000"
      - "5173:5173"
    networks:
      - avablox-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  avablox-net:
    driver: bridge